<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250" width="440" height="250">
  <defs>
    <!-- Dark glow for terminal window -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Neon glows for terminal lines -->
    <filter id="blue-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .terminal-window {
      fill: #161B22;
      stroke: #30363d;
      stroke-width: 1.5;
      rx: 8;
      filter: url(#glow);
    }
    .header-bar {
      fill: #0D1117;
      stroke: #30363d;
      stroke-dasharray: 0 0 440;
      stroke-width: 1;
    }
    .title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      fill: #8B949E;
      font-weight: bold;
    }
    .label {
      font-family: 'DejaVu Sans Mono', Consolas, Monaco, monospace;
      font-size: 12px;
      fill: #39D0FF; /* Cyan */
      font-weight: bold;
    }
    .value {
      font-family: 'DejaVu Sans Mono', Consolas, Monaco, monospace;
      font-size: 11px;
      fill: #8B949E; /* Light Gray */
    }
    .percentage {
      font-family: 'DejaVu Sans Mono', Consolas, Monaco, monospace;
      font-size: 11px;
      fill: #A371F7; /* Purple */
    }
    .bar-bg {
      fill: #21262D;
      rx: 2;
    }
    .bar-fill {
      rx: 2;
      filter: url(#blue-glow);
    }
    .cpu-fill {
      fill: #58A6FF; /* AI Blue */
      animation: pulse-cpu 4s infinite ease-in-out;
    }
    .gpu-fill {
      fill: #A371F7; /* Purple */
      animation: pulse-gpu 6s infinite ease-in-out;
    }
    .ram-fill {
      fill: #3FB950; /* Green */
      animation: pulse-ram 3s infinite ease-in-out;
    }
    .storage-fill {
      fill: #39D0FF; /* Cyan */
      animation: pulse-storage 8s infinite ease-in-out;
    }
    .network-fill {
      fill: #F0883E; /* Orange */
      animation: pulse-network 5s infinite ease-in-out;
    }
    
    .cursor {
      fill: #58A6FF;
      animation: blink 1s infinite steps(2, start);
    }

    @keyframes pulse-cpu {
      0%, 100% { width: 140px; }
      50% { width: 155px; }
    }
    @keyframes pulse-gpu {
      0%, 100% { width: 175px; }
      50% { width: 160px; }
    }
    @keyframes pulse-ram {
      0%, 100% { width: 110px; }
      50% { width: 118px; }
    }
    @keyframes pulse-storage {
      0%, 100% { width: 180px; }
      30% { width: 181px; }
      70% { width: 179px; }
    }
    @keyframes pulse-network {
      0%, 100% { width: 130px; }
      50% { width: 145px; }
    }
    @keyframes blink {
      to { visibility: hidden; }
    }
  </style>

  <!-- Terminal Window Background -->
  <rect class="terminal-window" x="10" y="10" width="420" height="230" />

  <!-- Header Bar -->
  <path class="header-bar" d="M10,10 h420 v25 a0,0 0 0 1 0,0 h-420 a0,0 0 0 1 0,0 z" />
  
  <!-- Window Buttons -->
  <circle cx="28" cy="22" r="5" fill="#FF5F56" />
  <circle cx="44" cy="22" r="5" fill="#FFBD2E" />
  <circle cx="60" cy="22" r="5" fill="#27C93F" />
  
  <!-- Window Title -->
  <text class="title" x="220" y="26" text-anchor="middle">AI.OS // SYSTEM MONITOR</text>

  <!-- Terminal Content Rows -->
  
  <!-- CPU (Research) -->
  <g transform="translate(25, 60)">
    <text class="label" x="0" y="12">CPU</text>
    <rect class="bar-bg" x="70" y="2" width="200" height="10" />
    <rect class="bar-fill cpu-fill" x="70" y="2" width="145" height="10" />
    <text class="percentage" x="280" y="11">72.5%</text>
    <text class="value" x="325" y="11">[RESEARCH]</text>
  </g>

  <!-- GPU (Training Models) -->
  <g transform="translate(25, 95)">
    <text class="label" x="0" y="12">GPU</text>
    <rect class="bar-bg" x="70" y="2" width="200" height="10" />
    <rect class="bar-fill gpu-fill" x="70" y="2" width="170" height="10" />
    <text class="percentage" x="280" y="11">85.0%</text>
    <text class="value" x="325" y="11">[TRAINING]</text>
  </g>

  <!-- RAM (Coffee) -->
  <g transform="translate(25, 130)">
    <text class="label" x="0" y="12">RAM</text>
    <rect class="bar-bg" x="70" y="2" width="200" height="10" />
    <rect class="bar-fill ram-fill" x="70" y="2" width="115" height="10" />
    <text class="percentage" x="280" y="11">57.5%</text>
    <text class="value" x="325" y="11">[COFFEE]</text>
  </g>

  <!-- STORAGE (Ideas) -->
  <g transform="translate(25, 165)">
    <text class="label" x="0" y="12">DISK</text>
    <rect class="bar-bg" x="70" y="2" width="200" height="10" />
    <rect class="bar-fill storage-fill" x="70" y="2" width="180" height="10" />
    <text class="percentage" x="280" y="11">90.0%</text>
    <text class="value" x="325" y="11">[IDEAS]</text>
  </g>

  <!-- NETWORK (Open Source) -->
  <g transform="translate(25, 200)">
    <text class="label" x="0" y="12">NET</text>
    <rect class="bar-bg" x="70" y="2" width="200" height="10" />
    <rect class="bar-fill network-fill" x="70" y="2" width="138" height="10" />
    <text class="percentage" x="280" y="11">69.0%</text>
    <text class="value" x="325" y="11">[OS_SYNC]</text>
  </g>

  <!-- Blinking Cursor -->
  <rect class="cursor" x="405" y="212" width="8" height="12" />

</svg>
