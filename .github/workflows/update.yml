name: Update Profile Panel

on:
  schedule:
    - cron: '0 0 * * *' # daily at midnight UTC
  workflow_dispatch:     # allow manual trigger

permissions:
  contents: write

jobs:
  update-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Refresh live fields (uptime, stats, fortune)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/update_stats.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/neofetch.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "sys: refresh live profile panel" && git push)
